server:
  port: 8080
  servlet:
    context-path: /api
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

spring:
  application:
    name: taoxichuan-ai-assessment
  
  profiles:
    active: dev
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/taoxichuan_ai?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: HikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
  
  cache:
    type: none
  
# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.taoxichuan.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      update-strategy: NOT_NULL
      insert-strategy: NOT_NULL

# Knife4j配置
knife4j:
  enable: true
  openapi:
    title: 陶溪川工业遗产AI智能损伤诊断评估系统API
    description: 系统API接口文档
    version: 1.0.0
    concat: 赵正楠
    email: zhaozhengnan@example.com
    license: MIT
    license-url: https://opensource.org/licenses/MIT
  setting:
    language: zh-CN
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表
    enable-version: false
    enable-reload-cache-parameter: false
    enable-after-script: true
    enable-filter-multipart-api-method-type: POST
    enable-filter-multipart-apis: false
    enable-request-cache: true
    enable-host: false
    enable-host-text: localhost:8080
    enable-home-custom: false
    home-custom-path: classpath:markdown/home.md
    enable-search: true
    enable-footer: false
    enable-footer-custom: true
    footer-custom-content: Apache License 2.0
    enable-dynamic-parameter: false
    enable-debug: true
    enable-open-api: true
    enable-group: true
    cors: false
    production: false
    basic:
      enable: false
      username: admin
      password: 123456

# AI模型配置
ai:
  model:
    provider: ${AI_MODEL_PROVIDER:glm47}
    api-url: ${AI_API_URL:https://api.siliconflow.cn/v1/chat/completions}
    api-key: ${AI_API_KEY:sk-ifhnzwaudztwgrmojfgflhgxnzejhxxoxsqncqwsewxhsmkr}
    model-name: ${AI_MODEL_NAME:Pro/zai-org/GLM-4.7}
    confidence-threshold: ${AI_CONFIDENCE_THRESHOLD:0.7}
    timeout: ${AI_TIMEOUT:30000}
    max-retry: ${AI_MAX_RETRY:3}

# 文件存储配置
file:
  upload:
    base-path: ${FILE_BASE_PATH:./uploads}
    max-size: ${FILE_MAX_SIZE:10485760}
    allowed-types: ${FILE_ALLOWED_TYPES:jpg,jpeg,png}
    image-path: ${FILE_IMAGE_PATH:images}
    model-path: ${FILE_MODEL_PATH:models}
    report-path: ${FILE_REPORT_PATH:reports}
  storage:
    type: ${STORAGE_TYPE:local}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket-name: ${MINIO_BUCKET:taoxichuan}

# 单点登录配置
sso:
  enabled: ${SSO_ENABLED:true}
  token-expire: ${SSO_TOKEN_EXPIRE:3600}
  refresh-expire: ${SSO_REFRESH_EXPIRE:604800}
  secret-key: ${SSO_SECRET_KEY:taoxichuan-secret-key-2024}

# 报告配置
report:
  template-path: ${REPORT_TEMPLATE_PATH:./templates}
  output-path: ${REPORT_OUTPUT_PATH:./reports}
  font-path: ${REPORT_FONT_PATH:./fonts}

# 日志配置
logging:
  level:
    com.taoxichuan: ${LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:WARN}
    org.springframework.web: ${WEB_LOG_LEVEL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:./logs/taoxichuan.log}
    max-size: 100MB
    max-history: 30

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

---
# 开发环境配置
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:taoxichuan_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
      path: /h2-console
  # 禁用Redis
  # redis:
  #   host: localhost
  #   port: 6379
  #   password: 

logging:
  level:
    com.taoxichuan: DEBUG
    org.springframework.security: DEBUG

knife4j:
  production: false

---
# 测试环境配置
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:mysql://test-db:3306/taoxichuan_ai_test?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: ${TEST_DB_USERNAME}
    password: ${TEST_DB_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  redis:
    host: ${TEST_REDIS_HOST}
    port: ${TEST_REDIS_PORT}
    password: ${TEST_REDIS_PASSWORD}

logging:
  level:
    com.taoxichuan: INFO
    root: WARN

knife4j:
  production: true

---
# 生产环境配置
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://prod-db:3306/taoxichuan_ai?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: ${PROD_DB_USERNAME}
    password: ${PROD_DB_PASSWORD}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  redis:
    host: ${PROD_REDIS_HOST}
    port: ${PROD_REDIS_PORT}
    password: ${PROD_REDIS_PASSWORD}
    lettuce:
      pool:
        max-active: 20
        max-wait: -1ms
        max-idle: 10
        min-idle: 5

logging:
  level:
    com.taoxichuan: WARN
    root: ERROR
  file:
    name: /var/log/taoxichuan/taoxichuan.log

knife4j:
  production: true
  enable: false

ai:
  model:
    provider: yolo11
    api-url: ${AI_API_URL}
    api-key: ${AI_API_KEY}

file:
  storage:
    type: minio
    minio:
      endpoint: ${MINIO_ENDPOINT}
      access-key: ${MINIO_ACCESS_KEY}
      secret-key: ${MINIO_SECRET_KEY}
      bucket-name: ${MINIO_BUCKET}
