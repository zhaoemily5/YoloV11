version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: taoxichuan-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-taoxichuan123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-taoxichuan_ai}
      MYSQL_USER: ${MYSQL_USER:-taoxichuan}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-taoxichuan123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - taoxichuan-network
    command: --default-authentication-plugin=mysql_native_password

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: taoxichuan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - taoxichuan-network
    command: redis-server --appendonly yes

  # MinIO对象存储
  minio:
    image: minio/minio:latest
    container_name: taoxichuan-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - taoxichuan-network
    command: server /data --console-address ":9001"

  # Java后端服务
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: taoxichuan-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-taoxichuan_ai}
      DB_USERNAME: ${MYSQL_USER:-taoxichuan}
      DB_PASSWORD: ${MYSQL_PASSWORD:-taoxichuan123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      AI_API_KEY: ${AI_API_KEY}
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      - mysql
      - redis
      - minio
    networks:
      - taoxichuan-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Vue前端服务
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: taoxichuan-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - taoxichuan-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: taoxichuan-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - logs_data:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - taoxichuan-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local

networks:
  taoxichuan-network:
    driver: bridge
